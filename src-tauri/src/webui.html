<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ktree 知识库</title>
<link rel="icon" href="/favicon.svg" />
<link rel="stylesheet" href="/lib/github.min.css" />
<script src="/lib/highlight.min.js"></script>
<script src="/lib/marked.min.js"></script>
<style>
  :root {
    --bg:#fff; --fg:#333; --sidebar:#f8f8f8; --muted:#999; --line:#eee;
    --accent:#5b21b6; --accent-bg:#e8e0f0; --link:#0066cc;
    --card:#fafafa; --card-line:#f0f0f0; --danger:#dc2626; --star:#f59e0b;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--fg); line-height:1.6; font-size:14px;
    -webkit-font-smoothing:antialiased; }
  .app { display:flex; height:100%; }

  .sidebar { width:240px; flex-shrink:0; background:var(--sidebar); border-right:1px solid var(--line);
    display:flex; flex-direction:column; overflow-y:auto; }
  .brand { padding:14px 18px 8px; font-size:18px; font-weight:600; color:#111;
    letter-spacing:-.01em; display:flex; align-items:center; gap:9px; }
  .brand img { width:26px; height:26px; flex-shrink:0; }
  .brand-ops { margin-left:auto; width:28px; height:28px; border:none; background:transparent;
    color:#888; cursor:pointer; border-radius:6px; font-size:18px; font-weight:700;
    line-height:1; padding:0; display:flex; align-items:center; justify-content:center;
    letter-spacing:1px; }
  .brand-ops:hover { background:#eee; color:#333; }
  /* 操作 dialog */
  .ops-dlg-list { max-height:60vh; overflow-y:auto; }
  .ops-kb-block { padding:10px 12px; border:1px solid var(--line); border-radius:8px;
    margin-bottom:10px; background:#fafafa; }
  .ops-kb-head { font-weight:600; font-size:14px; color:#222; margin-bottom:8px;
    display:flex; align-items:center; gap:8px; }
  .ops-kb-head .badge { font-size:11px; color:#888; font-weight:400; }
  .ops-actions { display:flex; flex-wrap:wrap; gap:6px; }
  .ops-actions .btn { padding:4px 10px; font-size:12px; font-weight:500; }
  .ops-vcs-row { display:flex; flex-direction:column; gap:4px; padding:6px 0;
    font-size:12.5px; color:#555; border-top:1px dashed #ececec; }
  .ops-vcs-row .vcs-line { display:flex; align-items:center; gap:8px; }
  .ops-vcs-row .vcs-info { flex:1; min-width:0; overflow:hidden;
    text-overflow:ellipsis; white-space:nowrap; }
  .ops-vcs-row .vcs-info code { background:#ececec; padding:1px 6px; border-radius:3px;
    font-size:11px; }
  .ops-vcs-row .vcs-last { font-size:11.5px; color:#888; padding-left:2px; }
  .ops-vcs-row .vcs-last.empty { color:#bbb; }
  .ops-vcs-row .vcs-last.fail { color:#c0392b; }
  .ops-vcs-row .vcs-last .tag { background:#eee; color:#666; padding:1px 5px;
    border-radius:3px; font-size:10.5px; margin-right:4px; }
  .ops-vcs-row .vcs-last .tag.auto { background:#e8f1fb; color:#2a6cb3; }
  .ops-vcs-row .vcs-last .tag.manual { background:#f0eef9; color:#6849c7; }
  .ops-empty { color:#aaa; font-size:12px; padding:6px 0; }
  .ops-report { font-size:12px; color:#555; padding:8px 10px; background:#f5f5f5;
    border-radius:6px; margin-top:8px; white-space:pre-wrap; word-break:break-all;
    max-height:280px; overflow-y:auto; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
  /* 操作弹窗 - tab 切换 */
  .ops-tabs { display:flex; gap:2px; margin:10px 0 14px; border-bottom:1px solid var(--line); }
  .ops-tab { background:none; border:none; padding:8px 16px; font-size:13.5px; color:#888;
    cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; font-weight:500; }
  .ops-tab:hover { color:#333; }
  .ops-tab.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:600; }
  /* 操作弹窗 - AI 接入区块 */
  .ops-sec-title { font-size:11px; font-weight:600; color:#999; letter-spacing:.06em;
    text-transform:uppercase; margin:10px 2px 6px; }
  .ops-ai-block { padding:12px 14px; border:1px solid var(--card-line);
    border-radius:8px; background:#faf8fd; }
  .ops-ai-intro { font-size:12px; color:#666; line-height:1.6; margin-bottom:10px; }
  .ops-ai-intro b { color:var(--accent); }
  .ops-ai-row { display:flex; align-items:center; gap:8px; padding:4px 0; font-size:12.5px; }
  .ops-ai-row .lbl { width:78px; flex-shrink:0; color:#888; font-size:12px; }
  .ops-ai-row .val { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis;
    white-space:nowrap; background:#fff; border:1px solid #ececec; border-radius:5px;
    padding:4px 8px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    font-size:12px; color:#333; }
  .ops-ai-cmd { margin-top:10px; }
  .ops-ai-cmd-head { display:flex; align-items:center; justify-content:space-between;
    font-size:11.5px; color:#777; margin-bottom:4px; }
  .ops-ai-cmd-body { display:block; background:#fff; border:1px solid #ececec;
    border-radius:6px; padding:8px 10px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    font-size:11.5px; color:#333; line-height:1.55; white-space:pre;
    overflow-x:auto; max-height:280px; overflow-y:auto; }
  .ops-ai-hint { margin-top:8px; font-size:11.5px; color:#999; line-height:1.55; }
  .ops-ai-hint code { background:#eee; padding:1px 5px; border-radius:3px; font-size:11px; }
  .nav-fav { display:flex; align-items:center; gap:8px; margin:0 8px 4px; padding:7px 12px;
    border-radius:7px; cursor:pointer; color:#555; font-size:14px; }
  .nav-fav:hover { background:#efefef; color:#111; }
  .nav-fav.active { background:var(--accent-bg); color:var(--accent); font-weight:500; }
  .nav-fav .star { color:var(--star); width:15px; height:15px; }
  .nav-fav .nico { width:15px; height:15px; flex-shrink:0; }
  #navNotes { margin-top:10px; }
  .kb-list { flex:1; padding:4px 8px; }

  /* 记事板 */
  .notes-view { padding:18px 22px; }
  @keyframes noteFlash { from { background:#fff3c4; } to { background:#fff; } }
  .note-card.flash { animation:noteFlash 1.9s ease; }
  .note-form { background:#fff; border:1px solid #e6e6e6; border-radius:10px;
    padding:14px; margin-bottom:18px; display:flex; flex-direction:column; gap:10px; }
  .note-form input, .note-form textarea, .note-form select {
    font:inherit; padding:7px 10px; border:1px solid #ddd; border-radius:7px; }
  .note-form textarea { min-height:80px; resize:vertical; }
  .nf-row { display:flex; gap:10px; }
  .nf-row select, .nf-row input { flex:1; min-width:0; }
  .nf-actions { display:flex; justify-content:flex-end; gap:10px; }
  .notes-section { margin-bottom:22px; }
  .notes-section h4 { font-size:13px; color:#888; font-weight:600; margin:0 0 10px; }
  .notes-list { display:grid; gap:10px;
    grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); }
  .note-card { box-sizing:border-box;
    position:relative; background:#fff; border:1px solid #ececec;
    border-radius:9px; padding:8px 32px 8px 13px; cursor:pointer; }
  .note-card:hover { border-color:#d8c9ee; background:#faf9fc; }
  .note-title { font-size:17px; font-weight:600; color:#222; margin-bottom:3px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .note-line { font-size:12.5px; color:#8a8a8a;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  /* 失效的知识库链接(目标库已改名/删除) */
  .note-broken { color:#c0392b; background:#fdf0ee; padding:1px 6px;
    border-radius:4px; font-size:11px; }
  .note-actions { position:absolute; top:5px; right:6px; display:flex; gap:1px;
    opacity:0; transition:opacity .12s ease; }
  .note-card:hover .note-actions { opacity:1; }
  .note-act { border:none; background:none; color:#b4b4b4; cursor:pointer;
    line-height:1; padding:3px 5px; border-radius:4px; display:flex; align-items:center; }
  .note-act svg { width:14px; height:14px; display:block; }
  .note-act:hover { background:#ececec; color:#555; }
  .note-act.del:hover { background:#fdeaea; color:#dc2626; }
  .note-ic { display:inline-flex; vertical-align:-2px; margin-right:4px; color:#a0a0a0; }
  .note-ic svg { width:13px; height:13px; }
  .note-act.on { color:#5b21b6; }
  .note-card.pinned { border-color:#d8c9ee; }
  @keyframes noteSelPulse {
    0%   { box-shadow:0 0 0 3px rgba(91,33,182,.85), 0 0 0 7px rgba(91,33,182,.4),  0 6px 18px rgba(91,33,182,.3); }
    70%  { box-shadow:0 0 0 3px rgba(91,33,182,.7),  0 0 0 22px rgba(91,33,182,0),  0 6px 18px rgba(91,33,182,.22); }
    100% { box-shadow:0 0 0 3px rgba(91,33,182,.7),  0 0 0 22px rgba(91,33,182,0),  0 6px 18px rgba(91,33,182,.22); }
  }
  .note-card.selected { border-color:#5b21b6; outline:2px solid #5b21b6; outline-offset:1px;
    animation:noteSelPulse 1.4s ease-out infinite; }
  .note-card.selected::before { content:''; position:absolute; left:-1px; top:-1px; bottom:-1px;
    width:5px; background:#5b21b6; border-radius:9px 0 0 9px; }
  .note-pin-mark { display:inline-flex; vertical-align:-2px; margin-right:4px; color:#5b21b6; }
  .note-pin-mark svg { width:13px; height:13px; }
  .nf-mode { font-size:13px; font-weight:600; color:#666; }
  .nf-colors { display:flex; gap:7px; align-items:center; }
  .nf-color { width:22px; height:22px; border-radius:50%; cursor:pointer;
    box-sizing:border-box; border:2px solid transparent; }
  .nf-color.sel { border-color:#5b21b6; }
  .nf-color.none { background:#fff; border:1px solid #ddd; }
  .nf-color.none.sel { border:2px solid #5b21b6; }
  .notes-empty { color:#bbb; font-size:13px; padding:6px 2px; }
  .note-modal-ov { position:fixed; inset:0; background:rgba(0,0,0,.42);
    display:flex; align-items:center; justify-content:center; z-index:300; }
  .note-modal { background:#fff; border-radius:12px; padding:20px 22px;
    width:540px; max-width:90vw; max-height:80vh; display:flex; flex-direction:column;
    box-shadow:0 16px 56px rgba(0,0,0,.3); }
  .note-modal-title { font-size:16px; font-weight:600; color:#111; margin-bottom:12px;
    word-break:break-word; }
  .note-modal-body { white-space:pre-wrap; word-break:break-word; overflow:auto;
    font-size:14px; line-height:1.7; color:#333; }
  .note-modal-foot { display:flex; justify-content:flex-end; margin-top:16px; }
  .kb-node { margin-bottom:2px; }
  .kb-head { display:flex; align-items:center; gap:6px; padding:7px 10px; border-radius:7px;
    cursor:pointer; font-weight:600; color:#333; font-size:14px; }
  .kb-head:hover { background:#efefef; }
  .kb-head .caret { color:var(--muted); font-size:10px; width:10px; transition:transform .12s; }
  .kb-head.open .caret { transform:rotate(90deg); }
  .kb-head .kbcnt { margin-left:auto; color:var(--muted); font-size:12px; font-weight:400; }
  .kb-body { display:none; padding:2px 0 4px; }
  .kb-node.open .kb-body { display:block; }
  .t-caret { color:var(--muted); font-size:10px; width:12px; flex-shrink:0;
    text-align:center; cursor:pointer; user-select:none; }
  .t-caret:hover { color:#333; }
  .resizer { width:5px; cursor:col-resize; background:transparent; flex-shrink:0;
    transition:background .15s; }
  .resizer:hover, .resizer.dragging { background:var(--accent-bg); }
  .tree-item { display:flex; align-items:center; gap:6px; padding:5px 10px; border-radius:7px;
    cursor:pointer; color:#555; font-size:13px; }
  .tree-item:hover { background:#efefef; color:#111; }
  .tree-item.active { background:var(--accent-bg); color:var(--accent); font-weight:500; }
  .tree-ico { width:15px; height:15px; flex-shrink:0; position:relative; }
  /* 系统分区目录(upload/vcs/cloud)的齿轮角标 */
  .gear-badge { position:absolute; right:-4px; bottom:-4px; width:10px; height:10px;
    background:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 0 1px rgba(0,0,0,.06); }
  .gear-badge svg { width:8px; height:8px; }
  .tc-img .gear-badge { width:18px; height:18px; right:8px; bottom:8px; }
  .tc-img .gear-badge svg { width:14px; height:14px; }
  /* 系统目录的说明文字(· 阅读视图 / · 上传文件 …):淡灰、不加粗 */
  .dir-desc { color:#b8b7c0; font-weight:400; font-size:.92em; }
  .tree-item.active .dir-desc { color:#a99cc9; }
  .breadcrumb .cur .dir-desc, .breadcrumb a .dir-desc { color:#b8b7c0; }
  .side-status { padding:8px 20px 12px; font-size:12px; color:var(--muted);
    border-top:1px solid var(--line); }

  .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  .topbar { display:flex; align-items:center; gap:12px; padding:11px 24px;
    border-bottom:1px solid var(--line); background:#f8f8f8; }
  .breadcrumb { display:flex; align-items:center; flex:1; min-width:0;
    flex-wrap:nowrap; overflow-x:auto; overflow-y:hidden; white-space:nowrap;
    font-size:15px; scrollbar-width:thin; }
  .breadcrumb::-webkit-scrollbar { height:4px; }
  .breadcrumb::-webkit-scrollbar-thumb { background:#ddd; border-radius:2px; }
  .breadcrumb a { color:#555; cursor:pointer; flex-shrink:0; white-space:nowrap; }
  .breadcrumb a:hover { color:#111; }
  .breadcrumb span.sep { margin:0 5px; color:#ccc; flex-shrink:0; }
  .breadcrumb span.cur { color:#111; font-weight:600; flex-shrink:0; }
  .breadcrumb span.ro { margin-left:8px; font-size:11px; color:#b08; background:#fbeaf3;
    padding:1px 7px; border-radius:4px; font-weight:500; }
  .topbar-actions { display:flex; align-items:center; gap:8px; flex-shrink:0; }
  .search-input { width:200px; padding:6px 11px; border:none; border-radius:7px;
    background:#ececec; font-size:13px; color:#333; outline:none; transition:.15s; }
  .search-input:focus { width:260px; background:#fff; box-shadow:0 0 0 1.5px #c7b8e0; }
  .search-input::placeholder { color:#aaa; }
  .search-wrap { position:relative; }
  .search-clear { position:absolute; right:6px; top:50%; transform:translateY(-50%);
    width:18px; height:18px; border:none; border-radius:50%; background:#d5d5dc; color:#fff;
    font-size:13px; line-height:1; cursor:pointer; display:flex;
    align-items:center; justify-content:center; padding:0; }
  .search-clear:hover { background:#b9b6cb; }
  /* 有清空按钮时给输入文字留出右边距 */
  .search-input { padding-right:28px; }
  .search-hist { position:absolute; top:calc(100% + 4px); left:0; right:0;
    background:#fff; border:1px solid #e2e2e2; border-radius:8px;
    box-shadow:0 8px 26px rgba(0,0,0,.14); z-index:60; overflow:hidden;
    max-height:320px; overflow-y:auto; }
  .sh-head { display:flex; justify-content:space-between; padding:6px 11px;
    font-size:11px; color:#aaa; }
  .sh-clear { cursor:pointer; }
  .sh-clear:hover { color:#dc2626; }
  .sh-item { padding:7px 11px; font-size:13px; color:#444; cursor:pointer;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .sh-item:hover { background:#f2f0f7; color:#111; }
  .content { flex:1; overflow-y:auto; position:relative; padding:8px 24px 24px; }
  .content.drag-over::after { content:"松开上传文件 / 文件夹到当前目录"; position:absolute; inset:8px;
    border:2px dashed var(--accent); border-radius:12px; background:rgba(232,224,240,.5);
    display:flex; align-items:center; justify-content:center; color:var(--accent);
    font-size:15px; font-weight:500; pointer-events:none; z-index:5; }

  .file-list { }
  .file-item { display:flex; align-items:center; padding:11px 0; cursor:pointer;
    border-bottom:1px solid #f3f3f3; transition:background .1s; }
  .file-item:hover { background:#fafafa; margin:0 -12px; padding:11px 12px; border-radius:8px; }
  .file-icon { width:26px; height:26px; margin-right:12px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; position:relative; }
  .file-icon svg { width:26px; height:26px; }
  .file-icon .gear-badge { width:13px; height:13px; right:-3px; bottom:-1px; }
  .file-icon .gear-badge svg { width:10px; height:10px; }
  /* 小缩略图模式:file-icon 变成 48×48 带图片预览 */
  .file-item.thumb-sm .file-icon { width:48px; height:48px; margin-right:14px;
    border-radius:4px; overflow:hidden; background:#f5f5f5; }
  .file-item.thumb-sm .file-icon svg { width:28px; height:28px; opacity:.85; }
  .file-item.thumb-sm .file-icon img { width:100%; height:100%; object-fit:cover; }
  /* 大缩略图网格 */
  .thumb-grid { display:flex; flex-wrap:wrap; gap:14px; padding:6px 0 20px; }
  .thumb-card { width:160px; display:flex; flex-direction:column; align-items:stretch;
    border:1px solid #f0f0f0; border-radius:8px; background:#fafafa; cursor:pointer;
    overflow:hidden; transition:.15s; position:relative; }
  .thumb-card:hover { box-shadow:0 4px 14px rgba(0,0,0,.08); background:#fff; }
  .thumb-card .tc-img { width:100%; height:120px; display:flex; align-items:center;
    justify-content:center; background:#f5f5f5; position:relative; overflow:hidden; }
  .thumb-card .tc-img img { width:100%; height:100%; object-fit:cover; }
  .thumb-card .tc-img svg { width:48px; height:48px; opacity:.6; }
  .thumb-card .tc-size { position:absolute; bottom:4px; right:6px; font-size:10px;
    color:#fff; background:rgba(0,0,0,.45); padding:1px 5px; border-radius:4px; }
  .thumb-card .tc-name { padding:7px 9px; font-size:12px; color:#333; line-height:1.4;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .thumb-card .file-actions { display:none; position:absolute; right:6px; top:6px;
    background:rgba(255,255,255,.92); border-radius:6px; padding:2px; gap:2px;
    box-shadow:0 2px 8px rgba(0,0,0,.1); margin-left:0; }
  .thumb-card:hover .file-actions { display:flex; }
  /* 视图/排序 下拉菜单 */
  .vs-wrap { position:relative; }
  .vs-menu { position:absolute; right:0; top:calc(100% + 4px); min-width:150px;
    background:#fff; border:1px solid var(--line); border-radius:8px;
    box-shadow:0 6px 24px rgba(0,0,0,.1); padding:5px 0; z-index:60; }
  .vs-section { padding:4px 14px; font-size:11px; color:var(--muted); }
  .vs-item { padding:6px 14px; font-size:13px; color:#333; cursor:pointer;
    display:flex; align-items:center; gap:6px; user-select:none; }
  .vs-item:hover { background:#f5f5f5; }
  .vs-item .chk { width:14px; height:14px; color:var(--accent); flex-shrink:0; }
  .vs-sep { height:1px; background:#eee; margin:4px 0; }
  .file-name-wrap { flex:1; display:flex; align-items:center; overflow:hidden; min-width:0; }
  .file-name { font-size:15px; color:#333; overflow:hidden; text-overflow:ellipsis;
    white-space:nowrap; max-width:560px; }
  .file-item:hover .file-name { color:var(--link); }
  .file-item.is-folder .file-name { font-weight:500; }
  .color-dot { width:8px; height:8px; border-radius:50%; margin-left:7px; flex-shrink:0; }
  .file-actions { display:none; flex-shrink:0; margin-left:36px; gap:6px; align-items:center; }
  .file-item:hover .file-actions { display:flex; }
  .act-btn { padding:4px 9px; border:none; border-radius:6px; background:#ececec; color:#555;
    font-size:12px; cursor:pointer; white-space:nowrap; transition:all .15s; font-weight:500;
    display:inline-flex; align-items:center; gap:4px; line-height:1.4; }
  .act-btn svg { width:12px; height:12px; }
  .act-btn:hover { background:#e0e0e0; color:#222; }
  .act-btn.fav-on { color:var(--star); }
  .act-btn.copied { background:#ecfdf5; color:#059669; }
  .act-btn.danger:hover { background:#fde8e8; color:var(--danger); }
  .btn-more { padding:4px 8px; border:none; border-radius:6px; background:#ececec; color:#777;
    font-size:13px; cursor:pointer; line-height:1; }
  .btn-more:hover { background:#e0e0e0; color:#333; }
  .file-meta { font-size:13px; color:var(--muted); flex-shrink:0; }
  .file-size { width:84px; text-align:right; }
  .file-date { width:150px; text-align:right; }

  /* ... 菜单 */
  .more-menu { position:fixed; background:#fff; border:1px solid #e4e4e4; border-radius:9px;
    box-shadow:0 8px 28px rgba(0,0,0,.15); padding:6px; z-index:60; min-width:190px; }

// 哪些路径是"系统分区目录":src/docs 下的 upload / vcs / cloud 一级目录
function isAreaDir(path){
  return /^(src|docs)\/(upload|vcs|cloud)$/.test(String(path||''));
}
// 文件夹按所属区上色:docs 蓝、src 绿、.ktree 黄;src 下的 vcs/cloud 镜像区用只读色。
// 分区目录(upload/vcs/cloud)叠加齿轮角标,提示"系统管理的特殊目录"。
function folderIcon(path){
  const p=String(path||'');
  const first=p.split('/')[0];
  let icon;
  if(first==='src'){
    // 仓库同步区 / 云文档区:只读镜像 → 用只读图标
    icon=(p==='src/vcs'||p.startsWith('src/vcs/')||p==='src/cloud'||p.startsWith('src/cloud/'))
      ? SVG.folderRO : SVG.folderSrc;
  }
  else icon=SVG.folder;
  if(isAreaDir(p)) icon+=`<span class="gear-badge">${GEAR_SVG}</span>`;
  return icon;
}
// 系统目录的中文说明(树 / 面包屑用);非系统目录无说明。
// (.ktree 元数据目录对用户隐藏,不在此列)
const AREA_LABELS={
  'docs':'阅读视图',
  'src':'源文件',
  'src/upload':'上传文件',
  'src/vcs':'仓库同步',
  'src/cloud':'云文档',
};
// VCS 绑定的最近同步时间:key = kbId,value = { 绑定名: at_unix_ms }。loadTree 时拉取。
let VCS_SYNC_TIMES={};
// 目录显示 HTML:目录名(正常色)+ 说明文字(淡灰)。返回值是已转义的 HTML。
// kbId 传入时,vcs 绑定目录((src|docs)/vcs/<名>)会附带最近同步时间。
function dirLabelHtml(path,name,kbId){
  const base=esc(name||String(path||'').split('/').pop());
  const desc=AREA_LABELS[path];
  if(desc) return `${base}<span class="dir-desc"> · ${esc(desc)}</span>`;
  // vcs 绑定目录:显示最近同步时间
  const m=String(path||'').match(/^(?:src|docs)\/vcs\/([^/]+)$/);
  if(m && kbId){
    const ms=(VCS_SYNC_TIMES[kbId]||{})[m[1]];
    if(ms) return `${base}<span class="dir-desc"> · ${esc(fmtAgo(ms))}更新</span>`;
  }
  return base;
}
// 该路径是否在只读镜像区(vcs/cloud)内
function inMirrorArea(path){
  const p=String(path||'');
  return p==='src/vcs'||p.startsWith('src/vcs/')||p==='src/cloud'||p.startsWith('src/cloud/');
}
function fileIcon(name){
  const ext=(name.split('.').pop()||'').toLowerCase();
  if(MD_EXT.has(ext)) return SVG.markdown;
  if(ext==='json') return SVG.json;
  if(ext==='pdf') return SVG.pdf;
  if(ext==='doc'||ext==='docx'||ext==='txt') return SVG.doc;
  if(ext==='xls'||ext==='xlsx') return SVG.spreadsheet;
  if(IMG_EXT.has(ext)) return SVG.image;
  if(VIDEO_EXT.has(ext)) return SVG.video;
  if(AUDIO_EXT.has(ext)) return SVG.audio;
  if(ARCHIVE_EXT.has(ext)) return SVG.archive;
  if(CODE_EXT.has(ext)||HTML_EXT.has(ext)) return SVG.code;
  return SVG.file;
}

// 统一风格弹框,替代系统 confirm / prompt
function dialog({message,detail=null,input=false,def='',okText='确定',danger=false}){
  return new Promise(resolve=>{
    const ov=document.createElement('div'); ov.className='dlg-overlay';
    const box=document.createElement('div'); box.className='dlg-box';
    const msg=document.createElement('div'); msg.className='dlg-msg'; msg.textContent=message;
    box.appendChild(msg);
    if(detail && detail.length){
      const dt=document.createElement('div'); dt.className='dlg-detail';
      dt.textContent=detail.join('\n');
      box.appendChild(dt);
    }
    let inp=null;
    if(input){
      inp=document.createElement('input'); inp.type='text'; inp.className='dlg-input'; inp.value=def;
      box.appendChild(inp);
    }
    const acts=document.createElement('div'); acts.className='dlg-actions';
    const cancel=document.createElement('button'); cancel.className='btn ghost'; cancel.textContent='取消';
    const ok=document.createElement('button'); ok.className='btn'+(danger?' dlg-danger':''); ok.textContent=okText;
    acts.append(cancel,ok); box.appendChild(acts);
    ov.appendChild(box); document.body.appendChild(ov);
    if(inp){ inp.focus(); inp.select(); }
    function done(v){ ov.remove(); document.removeEventListener('keydown',onkey); resolve(v); }
    function onkey(e){
      if(e.key==='Escape') done(input?null:false);
      else if(e.key==='Enter') done(input?inp.value:true);
    }
    cancel.onclick=()=>done(input?null:false);
    ok.onclick=()=>done(input?inp.value:true);
    ov.onclick=e=>{ if(e.target===ov) done(input?null:false); };
    document.addEventListener('keydown',onkey);
  });
}
function confirmDialog(message,opts={}){ return dialog({message,...opts}); }
function promptDialog(message,def=''){ return dialog({message,input:true,def}); }
function esc(s){ return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function badName(s){ return !s||s.includes('..')||s.includes('/')||s.includes('\\'); }
function fmtSize(n){ n=n||0; return n<1024?n+' B':n<1048576?(n/1024).toFixed(1)+' KB':(n/1048576).toFixed(1)+' MB'; }
function fmtDate(sec){
  if(!sec) return '';
  const d=new Date(sec*1000), p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function extOf(name){ return (name.split('.').pop()||'').toLowerCase(); }
// 静态文件直链:/<知识库名>/<相对知识库根的路径>
function rawUrl(path,kb){
  const segs=String(path).split('/').filter(Boolean).map(encodeURIComponent).join('/');
  return `/${encodeURIComponent(kb||CUR_KB)}/${segs}`;
}
// 复制给人看的直链:保留中文,只转义会破坏 URL 结构的 ASCII 字符。
function readablePathPart(s){
  return String(s).replace(/[%\u0000-\u001F\u007F "#<>?`{}|\\^[\]]/g, c =>
    [...new TextEncoder().encode(c)].map(b => '%' + b.toString(16).toUpperCase().padStart(2,'0')).join('')
  );
}
function readableRawUrl(path,kb){
  const segs=String(path).split('/').filter(Boolean).map(readablePathPart).join('/');
  return `/${readablePathPart(kb||CUR_KB)}/${segs}`;
}
function readableDirUrl(path,kb){
  const segs=[readablePathPart(kb||CUR_KB), ...String(path||'').split('/').filter(Boolean).map(readablePathPart)];
  return '/#/'+segs.join('/');
}
async function api(path,opts){
  const r=await fetch(path,opts);
  const ct=r.headers.get('content-type')||'';
  return ct.includes('application/json')?r.json():r.text();
}
// 复制文本(HTTP 环境下 navigator.clipboard 不可用,回退 execCommand)
async function copyText(text){
  try { await navigator.clipboard.writeText(text); return true; }
  catch(e){
    const ta=document.createElement('textarea');
    ta.value=text; ta.style.cssText='position:fixed;top:0;left:0;opacity:0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    let ok=false; try{ ok=document.execCommand('copy'); }catch(_){}
    ta.remove(); return ok;
  }
}

function renderCrumb(){
  const bc=document.getElementById('breadcrumb');
  if(VIEW==='notes'){ bc.innerHTML='<span class="cur">记事板</span>'; return; }
  const kb=KBS.find(k=>k.id===CUR_KB);
  if(!kb){ bc.innerHTML='<span class="cur">'+(KBS.length?'选择目录':'还没有知识库')+'</span>'; return; }
  let h=`<a data-nav data-kb="${esc(kb.id)}" data-path="">${esc(kb.name)}</a>`;
  if(VIEW==='search'){
    h+=`<span class="sep">/</span><span class="cur">搜索「${esc(LAST_QUERY)}」</span>`;
  }else{
    const parts=(CUR_PATH||'').split('/').filter(Boolean);
    let acc='';
    parts.forEach((p,idx)=>{
      acc=acc?acc+'/'+p:p;
      const label=dirLabelHtml(acc,p,kb.id); // 已转义 HTML(含淡灰说明/同步时间)
      h+='<span class="sep">/</span>';
      h+=(idx===parts.length-1)
        ? `<span class="cur">${label}</span>`
        : `<a data-nav data-kb="${esc(kb.id)}" data-path="${esc(acc)}">${label}</a>`;
    });
    if(!WRITABLE && CUR_PATH){
      h+=inMirrorArea(CUR_PATH)?'<span class="ro">只读 · 同步维护</span>':'<span class="ro">只读</span>';
    }
  }
  bc.innerHTML=h;
  bc.querySelectorAll('a[data-nav]').forEach(a=>a.addEventListener('click',()=>{
    selectFolder(a.dataset.kb, a.dataset.path||'src');
  }));
}

// ---------- 侧栏宽度记忆 ----------
(function initResizer(){
  const sb=document.querySelector('.sidebar');
  const rz=document.getElementById('resizer');
  const stored=+localStorage.getItem('ktree-sidebar-w');
  if(stored && stored>=160 && stored<=720) sb.style.width=stored+'px';
  rz.addEventListener('mousedown',e=>{
    e.preventDefault();
    const startX=e.clientX, startW=sb.offsetWidth;
    rz.classList.add('dragging');
    document.body.style.cursor='col-resize';
    document.body.style.userSelect='none';
    function onMove(e2){
      const w=Math.max(160,Math.min(720,startW+e2.clientX-startX));
      sb.style.width=w+'px';
    }
    function onUp(){
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseup',onUp);
      rz.classList.remove('dragging');
      document.body.style.cursor='';
      document.body.style.userSelect='';
      localStorage.setItem('ktree-sidebar-w',sb.offsetWidth);
    }
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  });
})();

// 知识库操作面板:只做「查看绑定 + 手动同步」。
// 绑定的添加 / 修改 / 删除在桌面端「Ktree → 设置」窗口里配置。
async function renderOpsList(host){
  host.innerHTML='';
  if(!KBS.length){ host.innerHTML='<div class="empty">还没有知识库</div>'; return; }
  for(const kb of KBS){
    const block=document.createElement('div'); block.className='ops-kb-block';
    block.innerHTML=`
      <div class="ops-kb-head">
        <span>${esc(kb.name)}</span>
        <span class="badge">${kb.documents||0} 篇 · ${esc(kb.root||'')}</span>
      </div>
      <div class="ops-actions">
        <button class="btn ghost" data-act="vcs-all">同步全部仓库</button>
        <span class="hint" style="align-self:center">绑定的添加 / 删除请在桌面端「Ktree → 设置」中配置</span>
      </div>
      <div class="vcs-list" data-vcs-host="1"><div class="ops-empty">加载仓库绑定…</div></div>
      <div class="ops-report" data-report="1" style="display:none"></div>`;
    const reportBox=block.querySelector('[data-report]');
    function show(msg){ reportBox.style.display='block'; reportBox.textContent=msg; }

    // ---- 仓库(VCS)绑定:列表 + 手动同步 ----
    const vcsHost=block.querySelector('[data-vcs-host]');
    async function reloadVcs(){
      try{
        const r=await api(`/api/kb/${encodeURIComponent(kb.id)}/vcs`);
        const bindings=r.bindings||[];
        if(!bindings.length){
          vcsHost.innerHTML='<div class="ops-empty">未绑定仓库。在桌面端「Ktree → 设置」添加后,内容将镜像到 src/vcs/&lt;名字&gt;/(只读)。</div>';
          return;
        }
        vcsHost.innerHTML='';
        bindings.forEach(b=>{
          const row=document.createElement('div'); row.className='ops-vcs-row';
          row.innerHTML=`
            <div class="vcs-line">
              <div class="vcs-info">
                <code>${esc(b.vcs_type)}</code> · src/vcs/${esc(b.name)} ← ${esc(b.url)}${b.repo_sub_path?(' :: '+esc(b.repo_sub_path)):''}
                ${b.branch?` <span style="color:#aaa">[${esc(b.branch)}]</span>`:''}
                ${b.has_credentials?' <span style="color:#888;font-size:11px">(自定义凭证)</span>':''}
              </div>
              <button class="btn ghost sm" ${b.syncing?'disabled':''}>${b.syncing?'同步中…':'同步'}</button>
            </div>
            <div class="vcs-last">${renderVcsLast(b.last_sync, b.sync_interval_minutes, b.syncing)}</div>`;
          row.querySelector('button').addEventListener('click',()=>{
            show(`同步 ${b.vcs_type}: ${b.url} …(大仓库首次同步可能较久,可关闭此窗口,后台会继续)`);
            // 不 await 到底 —— 大仓库同步可能要几十分钟,连接断了服务端也会继续跑;
            // 完成与否靠下方轮询刷新状态。
            api(`/api/kb/${encodeURIComponent(kb.id)}/vcs/${b.idx}/sync`,{method:'POST'})
              .then(rr=>{ if(rr&&rr.report){ show(formatVcsReport(rr.report)); } reloadVcs(); loadKbs(); refreshVcsTimes(kb.id); afterSyncConfirm(rr&&rr.report?[rr.report]:[]); })
              .catch(()=>{});
            reloadVcs(); startSyncPolling();
          });
          vcsHost.appendChild(row);
        });
        if(bindings.some(b=>b.syncing)) startSyncPolling();
      }catch(e){ vcsHost.innerHTML='<div class="ops-empty">仓库绑定加载失败:'+esc(e)+'</div>'; }
    }

    // (云文档绑定功能已封存:后端 API 保留,操作面板暂不展示;以后有需求再恢复)

    // ---- 同步中轮询:每 5s 刷新绑定状态与文档数,直到没有进行中的同步 ----
    let pollTimer=null;
    function startSyncPolling(){
      if(pollTimer) return;
      pollTimer=setInterval(async ()=>{
        // 操作弹窗已关闭 → 停止轮询
        if(!document.body.contains(block)){ clearInterval(pollTimer); pollTimer=null; return; }
        await reloadVcs(); loadKbs();
        if(!block.querySelector('.vcs-line button[disabled]')){
          clearInterval(pollTimer); pollTimer=null;
        }
      },5000);
    }

    block.querySelector('[data-act="vcs-all"]').addEventListener('click',()=>{
      show('同步所有仓库绑定…(可关闭此窗口,后台会继续)');
      api(`/api/kb/${encodeURIComponent(kb.id)}/vcs/sync`,{method:'POST'})
        .then(r=>{ if(r) show(formatVcsReports(r.reports||[], r.errors||[])); reloadVcs(); loadKbs(); refreshVcsTimes(kb.id); afterSyncConfirm((r&&r.reports)||[]); })
        .catch(()=>{});
      reloadVcs(); startSyncPolling();
    });

    await reloadVcs();
    host.appendChild(block);
  }
}

// 重新拉某知识库的 VCS 绑定同步时间,刷新左侧树(同步完成后"X 分钟前更新"立即更新,
// 不必刷新整页 —— 满足"无内容变化但时间已变"的场景)。
async function refreshVcsTimes(kbId){
  try{
    const r=await api(`/api/kb/${encodeURIComponent(kbId)}/vcs`);
    const times={};
    (r.bindings||[]).forEach(b=>{ if(b.last_sync) times[b.name]=b.last_sync.at_unix_ms; });
    VCS_SYNC_TIMES[kbId]=times;
    renderSidebar();
  }catch(e){}
}
// 同步完成后弹确认框,汇总新增/更新/删除条数;点「刷新页面查看」reload(树的更新时间、
// 目录内容随之刷新),点「留在本页」只在后台静默刷新绑定状态。
async function afterSyncConfirm(reports){
  if(!reports || !reports.length) return;
  let added=0, updated=0, deleted=0, failed=0;
  const samples=[];
  for(const r of reports){
    added+=(r.added||[]).length; updated+=(r.updated||[]).length;
    deleted+=(r.deleted||[]).length; failed+=(r.failed||[]).length;
    [...(r.added||[]).map(f=>'+ '+f), ...(r.updated||[]).map(f=>'~ '+f), ...(r.deleted||[]).map(f=>'- '+f)]
      .slice(0,8).forEach(s=>samples.push(s));
  }
  // 无任何变化就不打扰(避免每次"已是最新"都弹框)
  if(added+updated+deleted+failed===0) return;
  const head=`同步完成:新增 ${added} · 更新 ${updated} · 删除 ${deleted}`+(failed?` · 失败 ${failed}`:'');
  const detail=samples.length?(samples.length<8?samples:[...samples,`… 等共 ${added+updated+deleted} 项`]):null;
  const ok=await confirmDialog(head,{detail,okText:'刷新页面查看'});
  if(ok) location.reload();
}

// 单条绑定的"最近一次同步"摘要,显示在绑定行下方。
// syncing=true 表示后端正在同步 → 优先显示进行中状态。
// last 可能为 null(后端从未同步过) → 看 interval 决定提示"待自动同步"还是"未同步"。
function renderVcsLast(last, intervalMinutes, syncing){
  if(syncing){
    return `<span class="empty">⏳ 同步进行中…(首次同步大仓库较久:拉取完成后才开始逐个转换入库,docs 会随之逐步出现)</span>`;
  }
  if(!last){
    if(intervalMinutes>0) return `<span class="empty">暂无同步记录 · 自动每 ${intervalMinutes} 分钟</span>`;
    return `<span class="empty">暂无同步记录</span>`;
  }
  const ago=fmtAgo(last.at_unix_ms);
  const srcTag=last.source==='auto'
    ? `<span class="tag auto">自动</span>`
    : `<span class="tag manual">手动</span>`;
  if(!last.ok){
    const err=last.error?(' · '+esc(String(last.error).slice(0,120))):'';
    return `<span class="fail">${srcTag}${esc(ago)} · 失败${err}</span>`;
  }
  const rev=last.revision?` · 修订 ${esc(String(last.revision).slice(0,12))}`:'';
  const failTail=last.failed>0?` · 失败 ${last.failed}`:'';
  const intervalTail=intervalMinutes>0?` · 自动每 ${intervalMinutes} 分钟`:'';
  return `${srcTag}${esc(ago)}${rev} · +${last.added} ~${last.updated} -${last.deleted}${failTail}${intervalTail}`;
}
function fmtAgo(unixMs){
  if(!unixMs) return '刚刚';
  const diff=Date.now()-unixMs;
  if(diff<0) return '刚刚';
  if(diff<60_000) return '刚刚';
  if(diff<3600_000) return Math.floor(diff/60_000)+' 分钟前';
  if(diff<86400_000) return Math.floor(diff/3600_000)+' 小时前';
  return Math.floor(diff/86400_000)+' 天前';
}

function formatVcsReport(r){
  if(!r) return '(无报告)';
  const lines=[
    `[${r.vcs_type}] ${r.url}${r.repo_sub_path?(' :: '+r.repo_sub_path):''} → src/vcs/${r.name}`,
    `  修订: ${r.revision||'(空)'}`,
    `  新增 ${r.added.length}  更新 ${r.updated.length}  删除 ${r.deleted.length}  失败 ${r.failed.length}`,
  ];
  ['added','updated','deleted','failed'].forEach(k=>{
    if(r[k] && r[k].length){
      lines.push(`  ${k}:`);
      r[k].slice(0,20).forEach(f=>lines.push('    '+f));
      if(r[k].length>20) lines.push(`    … (+${r[k].length-20})`);
    }
  });
  (r.messages||[]).slice(0,10).forEach(m=>lines.push('  '+m));
  return lines.join('\n');
}
function formatVcsReports(reports,errors){
  if(!reports.length && !errors.length) return '(没有配置 VCS 绑定)';
  const parts=reports.map(formatVcsReport);
  errors.forEach(e=>parts.push(`[#${e.idx}] 失败: ${e.error}`));
  return parts.join('\n\n');
}

async function boot(){
  updateFavCount();
  // 拉自定义域名:复制地址会优先用它替代 location.origin
  try { CUSTOM_DOMAIN=(await api('/api/env')).custom_domain||''; } catch(e){ CUSTOM_DOMAIN=''; }
  restoreTreeState(); // 刷新后恢复折叠 / 展开 / 当前目录
  await loadKbs();
  // web 链接直达:记事板 / 某条公共记事 / 某个目录 / 操作弹窗
  const route=parseHash();
  if(route && route.type==='note'){ showNotes(route.id||undefined); return; }
  if(route && route.type==='dir' && KBS.some(k=>k.id===route.kb)){
    await gotoDir(route.kb, route.path);
    return;
  }
  // #ops / #ops/ai:先按常规流程载入底层视图,最后再弹操作窗
  const opsTab=(route && route.type==='ops') ? (route.tab==='ai'?'ai':'ops') : null;
  // 首次打开默认进记事板,知识库目录保持合上
  if(FIRST_VISIT && !opsTab){ showNotes(); return; }
  if(KBS.length){
    if(!FIRST_VISIT && CUR_KB && KBS.some(k=>k.id===CUR_KB)){
      // 刷新:回到上次停留的位置,加载所有展开过的知识库的树
      EXPANDED.add(CUR_KB);
      for(const id of [...EXPANDED]){
        if(KBS.some(k=>k.id===id)) await loadTree(id);
      }
      renderSidebar();
      selectFolder(CUR_KB, CUR_PATH);
    } else {
      // 首次访问:展开第一个知识库,树里只开 docs
      const first=KBS[0].id;
      EXPANDED.add(first);
      await loadTree(first);
      renderSidebar();
      selectFolder(first, 'docs');
    }
  }
  else {
    renderCrumb();
    document.getElementById('listArea').innerHTML=
      '<div class="empty">还没有知识库,请在桌面端菜单栏「Ktree → 设置」中添加</div>';
  }
  // 带 #ops 链接打开:底层视图加载完后弹出操作窗
  if(opsTab) showOpsDialog(opsTab);
}
function updateFavCount(){
  const n=Object.keys(FAVS).length;
  document.getElementById('favCount').textContent=n?n:'';
}
async function loadKbs(){
  try { KBS=(await api('/api/kbs')).knowledge_bases||[]; } catch(e){ KBS=[]; }
  renderSidebar();
  const total=KBS.reduce((s,k)=>s+(k.documents||0),0);
  document.getElementById('sideStatus').textContent=
    `${KBS.length} 个知识库 · ${total} 篇文档 · :${location.port||'80'}`;
}
function renderSidebar(){
  const box=document.getElementById('kbList');
  if(!KBS.length){ box.innerHTML='<div class="hint" style="padding:8px 12px">无知识库</div>'; return; }
  box.innerHTML=KBS.map(kb=>{
    const open=EXPANDED.has(kb.id);
    const folders=TREES[kb.id]||[];
    // 预计算每个节点是否有子节点
    const hasChild=new Set();
    for(const a of folders) for(const b of folders) if(b.startsWith(a+'/')){ hasChild.add(a); break; }
    function ancestorCollapsed(f){
      const parts=f.split('/');
      for(let i=1;i<parts.length;i++){
        if(COLLAPSED.has(kb.id+'|'+parts.slice(0,i).join('/'))) return true;
      }
      return false;
    }
    const body=folders.filter(f=>!ancestorCollapsed(f)).map(f=>{
      const depth=f.split('/').length, nm=dirLabelHtml(f, f.split('/').pop(), kb.id); // 已转义 HTML
      const on=VIEW==='list'&&CUR_KB===kb.id&&CUR_PATH===f;
      const has=hasChild.has(f);
      const collapsed=COLLAPSED.has(kb.id+'|'+f);
      const caret=has
        ? `<span class="t-caret">${collapsed?'▶':'▼'}</span>`
        : `<span style="display:inline-block;width:12px;flex-shrink:0"></span>`;
      return `<div class="tree-item ${on?'active':''}" data-kb="${esc(kb.id)}" data-path="${esc(f)}"
        style="padding-left:${6+(depth-1)*14}px">${caret}<span class="tree-ico">${folderIcon(f)}</span>${nm}</div>`;
    }).join('');
    return `<div class="kb-node ${open?'open':''}" data-kb="${esc(kb.id)}">
      <div class="kb-head ${open?'open':''}" data-kb="${esc(kb.id)}">
        <span class="caret">▶</span><span>${esc(kb.name)}</span><span class="kbcnt">${kb.documents||0}</span>
      </div>
      <div class="kb-body">${body}</div>
    </div>`;
  }).join('');
  box.querySelectorAll('.kb-head').forEach(h=>h.addEventListener('click',()=>toggleKb(h.dataset.kb)));
  box.querySelectorAll('.tree-item').forEach(t=>{
    function toggle(){
      const car=t.querySelector('.t-caret'); // 叶子节点没有 caret → 不切换
      if(!car) return;
      const kb=t.dataset.kb, path=t.dataset.path, k=kb+'|'+path;
      if(COLLAPSED.has(k)){
        COLLAPSED.delete(k);
      } else {
        COLLAPSED.add(k);
        // 合上一个目录时,连带合上其下所有已展开的子目录 —— 再展开时子目录都是收起状态
        for(const f of (TREES[kb]||[])){
          if(f.startsWith(path+'/')) COLLAPSED.add(kb+'|'+f);
        }
      }
      renderSidebar();
      saveTreeState();
    }
    t.addEventListener('click',e=>{
      if(e.target.closest('.t-caret')){ e.stopPropagation(); toggle(); return; }
      selectFolder(t.dataset.kb,t.dataset.path);
      toggle(); // 单击目录:进入该目录的同时展开 / 合上它
    });
  });
}
async function toggleKb(kbId){
  if(EXPANDED.has(kbId)) EXPANDED.delete(kbId);
  else { EXPANDED.add(kbId); await loadTree(kbId); }
  renderSidebar();
  saveTreeState();
}
async function loadTree(kbId){
  try { TREES[kbId]=(await api('/api/tree?kb='+encodeURIComponent(kbId))).folders||[]; }
  catch(e){ TREES[kbId]=[]; }
  // 拉 VCS 绑定的最近同步时间,树里 vcs/<名> 目录后面显示"X 前更新"
  try {
    const r=await api(`/api/kb/${encodeURIComponent(kbId)}/vcs`);
    const times={};
    (r.bindings||[]).forEach(b=>{ if(b.last_sync) times[b.name]=b.last_sync.at_unix_ms; });
    VCS_SYNC_TIMES[kbId]=times;
  } catch(e){ VCS_SYNC_TIMES[kbId]={}; }
  if(FIRST_VISIT) applyFirstVisitCollapse(kbId);
}

// ---------- 选择目录 ----------
function selectFolder(kbId,path){
  VIEW='list'; CUR_KB=kbId; CUR_PATH=path||'src';
  document.getElementById('navNotes').classList.remove('active');
  document.getElementById('btnNewNote').style.display='none';
  // 侧栏树跟随:展开知识库节点 + 当前目录的所有祖先,让树一路显示并高亮到当前层。
  // (从面包屑 / 搜索路径 / URL 进到深层目录时,树需要自动展开到位)
  EXPANDED.add(kbId);
  const parts=(CUR_PATH||'').split('/').filter(Boolean);
  for(let i=1;i<parts.length;i++){
    COLLAPSED.delete(kbId+'|'+parts.slice(0,i).join('/'));
  }
  // 地址栏同步当前目录 → 复制地址栏 URL 即可分享此目录。
  // 用 location.hash 赋值(产生历史记录),浏览器前进/后退可在目录间导航;
  // hashchange 回调里有"已在目标目录"判断,不会重复加载。
  const target=dirHash(kbId,CUR_PATH);
  if(location.hash!==target) location.hash=target;
  saveTreeState();
  loadDir();
}

function folderActionsHtml(sub){

function colorDotHtml(kb,rp){
  const c=COLORS[fkey(kb,rp)];
  return c?`<span class="color-dot" style="background:${c}"></span>`:'';
}
function fileIconHtml(kb,f,thumbSm){
  // 小缩略图 + 图片:用真实缩略图;其它仍用 SVG 图标。
  const ext=(f.ext||extOf(f.name||'')).toLowerCase();
  if(thumbSm && IMG_EXT.has(ext)){
    return `<img src="${rawUrl(f.rel_path,kb)}" loading="lazy" alt=""/>`;
  }
  return fileIcon(f.name);
}
function previewPathOf(f){
  const rel=String(f.rel_path||'');
  const md=String(f.md_path||'');
  if(!md) return rel;
  // md_path 只是 docs/ 下的同名镜像时,预览直接走 src 原文件;真正转换出来的 md 仍走 md_path。
  if(rel.startsWith('src/') && md==='docs/'+rel.slice(4)) return rel;
  if(!rel.startsWith('src/') && !rel.startsWith('docs/') && md==='docs/'+rel) return 'src/'+rel;
  return md||rel;
}
function fileRow(kb,f){
  // f: {name, rel_path, ext, size, modified, doc_id, md_path}
  const previewPath=previewPathOf(f);
  const previewName=previewPath.split('/').pop();
  const isThumbSm=VIEW_MODE==='thumb-sm';
  return `<div class="file-item${isThumbSm?' thumb-sm':''}" data-act="view" data-kb="${esc(kb)}"
      data-path="${esc(previewPath)}" data-name="${esc(previewName)}">
    <div class="file-icon">${fileIconHtml(kb,f,isThumbSm)}</div>
    <div class="file-name-wrap">
      <span class="file-name">${esc(f.name)}</span>${colorDotHtml(kb,f.rel_path)}
      ${actionsHtml(kb,f.rel_path,f.ext,f.doc_id,f.md_path,f.assets_dir)}
    </div>
    <div class="file-meta file-size">${fmtSize(f.size)}</div>
    <div class="file-meta file-date">${fmtDate(f.modified)}</div>
  </div>`;
}
function fileCard(kb,f){
  // 大缩略图卡片
  const previewPath=previewPathOf(f);
  const previewName=previewPath.split('/').pop();
  const ext=(f.ext||extOf(f.name||'')).toLowerCase();
  const isImg=IMG_EXT.has(ext);
  const inner=isImg
    ? `<img src="${rawUrl(f.rel_path,kb)}" loading="lazy" alt=""/>`
    : fileIcon(f.name);
  const sizeTag=f.size?`<span class="tc-size">${fmtSize(f.size)}</span>`:'';
  return `<div class="thumb-card" data-act="view" data-kb="${esc(kb)}"
      data-path="${esc(previewPath)}" data-name="${esc(previewName)}">
    <div class="tc-img">${inner}${sizeTag}</div>
    <div class="tc-name">${esc(f.name)}${colorDotHtml(kb,f.rel_path)}</div>
    ${actionsHtml(kb,f.rel_path,f.ext,f.doc_id,f.md_path,f.assets_dir)}
  </div>`;
}
function folderCard(kb,sub,f){
  const c=COLORS[fkey(kb,sub,true)];
  const dot=c?`<span class="color-dot" style="background:${c}"></span>`:'';
  return `<div class="thumb-card" data-act="enter" data-path="${esc(sub)}">
    <div class="tc-img">${folderIcon(sub)}</div>
    <div class="tc-name">${esc(f.name)}${dot}</div>
    ${folderActionsHtml(sub)}
  </div>`;
}
// 排序:文件夹永远按名称;文件按当前 SORT
function sortItems(folders,files){
  const nameCmp=(a,b)=>a.name.localeCompare(b.name,'zh-CN');
  folders.sort(nameCmp);
  files.sort((a,b)=>{
    if(SORT==='size') return (b.size||0)-(a.size||0);
    if(SORT==='date') return (b.modified||0)-(a.modified||0);
    return nameCmp(a,b);
  });
}

async function loadDir(){
  const box=document.getElementById('listArea');
  box.innerHTML='<div class="empty">加载中…</div>';
  try {
    const r=await api(`/api/files?kb=${encodeURIComponent(CUR_KB)}&path=${encodeURIComponent(CUR_PATH)}`);
    WRITABLE=!!r.writable;
    document.getElementById('btnUpload').style.display=WRITABLE?'':'none';
    document.getElementById('btnUploadFolder').style.display=WRITABLE?'':'none';
    document.getElementById('btnNewFolder').style.display=WRITABLE?'':'none';
    renderCrumb(); renderSidebar();
    const folders=r.folders||[], files=r.files||[];
    LAST_FILES=files;
    sortItems(folders,files);
    if(!folders.length && !files.length){
      box.innerHTML='<div class="empty">'+(WRITABLE
        ?'此目录为空<br/>点右上「⬆ 上传」或拖拽文件到这里':'此目录为空')+'</div>';
      return;
    }
    if(VIEW_MODE==='thumb-lg'){
      let html='<div class="thumb-grid">';
      folders.forEach(f=>{
        const sub=CUR_PATH?CUR_PATH+'/'+f.name:f.name;
        html+=folderCard(CUR_KB,sub,f);

      files.forEach(f=>{ html+=fileCard(CUR_KB,f); });

      let html='<div class="file-list">';
      folders.forEach(f=>{

function renderDrawerFilter(){
  const box = document.getElementById('drawerFilter');
  box.innerHTML = '';
  const used = new Set(Object.values(COLORS));
  if (used.size === 0) return;
  // 「全部」按钮

  all.addEventListener('click', () => { DRAWER_FILTER = null; renderDrawerFilter(); renderDrawerContent(); });
  box.appendChild(all);

    const dot = document.createElement('div');
    dot.className = 'c' + (DRAWER_FILTER === c ? ' sel' : '');
    dot.style.background = c;
    dot.style.boxShadow = (DRAWER_FILTER === c) ? `0 0 0 2px #fff, 0 0 0 4px ${c}` : 'none';
    dot.addEventListener('click', () => { DRAWER_FILTER = c; renderDrawerFilter(); renderDrawerContent(); });

function renderDrawerContent(){
  const body = document.getElementById('drawerBody');
  body.innerHTML = '';
  let keys;
  if (DRAWER_FILTER) {
    keys = Object.keys(COLORS).filter(k => COLORS[k] === DRAWER_FILTER);
  } else {
    keys = Object.keys(FAVS);
  }
  if (!keys.length) {
    body.innerHTML = '<div class="bm-empty">' +
      (DRAWER_FILTER ? '无该颜色标记的项目' : '暂无收藏') + '</div>';
    return;
  }
  // 按知识库分组,key = "知识库名/相对路径"
  const groups = {};
  keys.forEach(k => {
    const i = k.indexOf('/'); if (i < 0) return;
    const kb = k.slice(0, i), rp = k.slice(i + 1);
    (groups[kb] = groups[kb] || []).push(rp);
  });
  const kbs = Object.keys(groups).sort();
  kbs.forEach((kb, idx) => {
    if (idx > 0) { const sep = document.createElement('div'); sep.className = 'bm-sep'; body.appendChild(sep); }
    const heading = document.createElement('div');
    heading.className = 'bm-heading'; heading.textContent = kb;
    body.appendChild(heading);
    groups[kb].sort((a,b)=>a.localeCompare(b)).forEach(rp => renderBookmarkItem(body, kb, rp));
  });
}

function renderBookmarkItem(body, kb, rpWithSlash){
  const isFolder = rpWithSlash.endsWith('/');
  const rp = isFolder ? rpWithSlash.slice(0, -1) : rpWithSlash;
  const name = rp.split('/').pop();
  const item = document.createElement('div');
  item.className = 'bm-item';
  const icon = document.createElement('span');
  icon.className = 'bm-icon';
  icon.innerHTML = isFolder ? folderIcon(rp) : fileIcon(name);
  const label = document.createElement('span');
  label.className = 'bm-path';
  label.textContent = rp.split('/').join(' / ') + (isFolder ? ' /' : '');
  label.title = rp + (isFolder ? '/' : '');
  // 色点紧跟文件名/路径后
  const color = COLORS[fkey(kb, rp, isFolder)];
  if (color) {
    const dot = document.createElement('span'); dot.className = 'bm-dot'; dot.style.background = color;
    label.appendChild(dot);
  }
  item.append(icon, label);
  const del = document.createElement('button');
  del.className = 'bm-del';
  del.innerHTML = '&times;';
  del.title = DRAWER_FILTER ? '清除该色标记' : '从收藏移除';
  del.addEventListener('click', e => {
    e.stopPropagation();
    const k = fkey(kb, rp, isFolder);
    if (DRAWER_FILTER) {
      delete COLORS[k]; saveLS('ktree-color', COLORS);
    } else {
      delete FAVS[k]; saveLS('ktree-fav', FAVS); updateFavCount();
    }
    refreshDrawer();
    if (VIEW === 'list') loadDir();
  });
  item.appendChild(del);
  item.addEventListener('click', async () => {
    closeDrawer();
    if (isFolder) {
      if (!EXPANDED.has(kb)) { EXPANDED.add(kb); await loadTree(kb); }
      selectFolder(kb, rp);
    } else {
      previewFile(rawUrl(rp, kb), name);
    }
  });
  body.appendChild(item);
}

// 解析 URL hash:
//   #notes / #note/<id>   → 记事板 / 定位某条公共记事
//   #ops / #ops/ai        → 操作弹窗(知识库操作 / AI 接入 tab)
//   #/<知识库>/<目录路径>   → 目录(地址栏可直接复制分享)
function parseHash(){
  const h=(location.hash||'').replace(/^#/,'');
  if(h==='notes') return { type:'note', id:null };
  const m=h.match(/^note\/(.+)$/);
  if(m){ try{ return { type:'note', id:decodeURIComponent(m[1]) }; }catch(e){ return { type:'note', id:m[1] }; } }
  // 操作弹窗路由
  if(h==='ops') return { type:'ops', tab:'ops' };
  const mo=h.match(/^ops\/(\w+)$/);
  if(mo) return { type:'ops', tab:mo[1] };
  // 目录路由:#/<kb>/<path…>(每段 URL 编码)
  if(h.startsWith('/')){
    const segs=h.slice(1).split('/').filter(Boolean).map(s=>{
      try{ return decodeURIComponent(s); }catch(e){ return s; }
    });
    if(segs.length) return { type:'dir', kb:segs[0], path:segs.slice(1).join('/') };
  }
  return null;
}
// 目录的分享 hash:#/<kb>/<path>(分段编码,中文目录名也能进 URL)
function dirHash(kb,path){
  const segs=[kb,...String(path||'').split('/').filter(Boolean)].map(encodeURIComponent);
  return '#/'+segs.join('/');
}
// 离开记事板时清掉 hash,避免刷新又跳回记事板。
function clearHash(){
  if(location.hash) history.replaceState(null,'',location.pathname+location.search);
}

  if(!KBS.some(k=>k.id===kb)){ toast('知识库「'+kb+'」不存在'); return; }
  EXPANDED.add(kb);
  if(!TREES[kb]) await loadTree(kb);
  renderSidebar();
  selectFolder(kb, path||'docs');
}
// 页面已加载后,地址栏 hash 变化(粘贴链接回车、前进后退)路由到记事板 / 目录 / 操作弹窗。
window.addEventListener('hashchange', ()=>{
  const route=parseHash();
  if(!route) return;
  if(route.type==='note'){ showNotes(route.id||undefined); return; }
  if(route.type==='ops'){ showOpsDialog(route.tab==='ai'?'ai':'ops'); return; }
  if(route.type==='dir'){
    // selectFolder 自己更新 hash 也会触发本事件 → 已在目标目录就不重复加载
    if(VIEW==='list' && CUR_KB===route.kb && CUR_PATH===(route.path||'docs')) return;
    gotoDir(route.kb, route.path);
  }
});

// 收集表单 → {title, note_type, content, kb_id, color};不合法时提示并返回 null。
function collectNote(){
  const title=document.getElementById('nfTitle').value.trim();
  const type=document.getElementById('nfType').value;
  let content='', kb_id='';
  if(type==='text') content=document.getElementById('nfText').value.trim();
  else if(type==='url'){
    content=document.getElementById('nfUrl').value.trim();
    if(content && !/^https?:\/\//i.test(content)) content='http://'+content;
  } else {
    const parsed=parseKbUrl(document.getElementById('nfKbUrl').value);
    if(!parsed){ toast('无法识别知识库链接'); return null; }
    if(!KBS.find(k=>k.id===parsed.kb)){ toast('链接里的知识库「'+parsed.kb+'」不存在'); return null; }
    kb_id=parsed.kb; content=parsed.path;
  }
  if(!title && !content){ toast('标题和内容不能都为空'); return null; }
  return { title, note_type:type, content, kb_id, color:NOTE_FORM_COLOR };
}

async function saveNote(){
  const data=collectNote();
  if(!data) return;
  const editing=NOTE_EDIT;
  const scope = editing ? editing.scope : document.getElementById('nfScope').value;
  if(editing){
    // 编辑是整体替换,保留原置顶状态(置顶是卡片操作、不在表单里)
    const orig=findNote(editing.id, editing.scope);
    data.pinned = orig ? !!orig.pinned : false;
  }
  if(scope==='local'){
    const arr=localNotes();
    if(editing){
      const i=arr.findIndex(n=>String(n.id)===String(editing.id));
      if(i>=0) arr[i]={ ...arr[i], ...data };
    } else {
      arr.unshift({ id:Date.now(), ...data, created_at:Math.floor(Date.now()/1000) });
    }
    saveLocalNotes(arr);
  } else {
    try {
      const path = editing ? '/api/notes/'+encodeURIComponent(editing.id) : '/api/notes';
      await api(path,{ method: editing?'PUT':'POST',
        headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
    } catch(e){ toast('保存失败:'+e); return; }
  }
  resetNoteForm();
  loadNotes();
}

async function loadNotes(){
  try { NOTES_PUB=(await api('/api/notes')).notes||[]; } catch(e){ NOTES_PUB=[]; }
  // 本地记事:置顶的排前面(公共记事后端已按 pinned 排序)
  NOTES_LOC=localNotes().slice().sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0));
  const pb=document.getElementById('notesPublic');
  if(pb) pb.innerHTML = NOTES_PUB.length
    ? NOTES_PUB.map(n=>noteCard(n,'public')).join('') : '<div class="notes-empty">暂无公共记事</div>';
  const lb=document.getElementById('notesLocal');
  if(lb) lb.innerHTML = NOTES_LOC.length
    ? NOTES_LOC.map(n=>noteCard(n,'local')).join('') : '<div class="notes-empty">暂无本地记事</div>';
  // 来自 web 链接的定位:滚动并高亮那条公共记事
  if(NOTE_FOCUS){
    const id=NOTE_FOCUS; NOTE_FOCUS=null;
    const card=document.querySelector('.note-card[data-id="'+id+'"][data-scope="public"]');
    if(card){
      card.scrollIntoView({ block:'center', behavior:'smooth' });
      card.classList.add('flash');
      setTimeout(()=>card.classList.remove('flash'), 1900);
    }
  }
}

function findNote(id, scope){
  const arr = scope==='public' ? NOTES_PUB : NOTES_LOC;
  return arr.find(n=>String(n.id)===String(id));
}

function noteCard(n, scope){
  let line;
  if(n.note_type==='url') line='<span class="note-ic">'+NOTE_IC.url+'</span>'+esc(n.content);
  else if(n.note_type==='kblink'){
    line='<span class="note-ic">'+NOTE_IC.kb+'</span>'+esc(n.kb_id)+' / '+esc(n.content||'(根目录)');
    // 目标知识库已不存在(改名/删除):标记失效,提示编辑修正
    if(!KBS.some(k=>k.id===n.kb_id)){
      line+=' <span class="note-broken">链接失效:知识库「'+esc(n.kb_id)+'」不存在,请编辑修正</span>';
    }
  }
  else line=esc((n.content||'').replace(/\s+/g,' '));
  const pinned = !!n.pinned;
  const selCls = (scope==='public' && NOTE_SELECTED!=null
    && String(n.id)===String(NOTE_SELECTED)) ? ' selected' : '';
  const bg = n.color ? ` style="background:${esc(n.color)}"` : '';
  const copyBtn = scope==='public'
    ? `<button class="note-act" data-act="notecopy" data-id="${n.id}" title="复制链接">${NOTE_IC.copy}</button>` : '';
  const mark = pinned ? '<span class="note-pin-mark">'+NOTE_IC.pin+'</span>' : '';
  const titleHtml = (n.title || pinned)
    ? `<div class="note-title">${mark}${esc(n.title||'')}</div>` : '';
  return `<div class="note-card${pinned?' pinned':''}${selCls}" data-act="notecard" data-id="${n.id}" data-scope="${scope}"${bg}>
    <div class="note-actions">
      <button class="note-act${pinned?' on':''}" data-act="notepin" data-id="${n.id}" data-scope="${scope}" title="${pinned?'取消置顶':'置顶'}">${NOTE_IC.pin}</button>
      ${copyBtn}
      <button class="note-act" data-act="noteedit" data-id="${n.id}" data-scope="${scope}" title="编辑">${NOTE_IC.edit}</button>
      <button class="note-act del" data-act="notedel" data-id="${n.id}" data-scope="${scope}" title="删除">${NOTE_IC.del}</button>
    </div>
    ${titleHtml}
    <div class="note-line">${line||'(空)'}</div>
  </div>`;
}

// 卡片点击:文本弹窗显示全文,网络链接新标签打开,知识库链接本页跳转。
function openNote(n){
  if(n.note_type==='url'){ if(n.content) window.open(n.content,'_blank'); }
  else if(n.note_type==='kblink'){
    // 失效链接:不跳转,提示编辑修正(知识库改名/删除会导致旧链接失效)
    if(!KBS.some(k=>k.id===n.kb_id)){
      toast(`知识库「${n.kb_id}」不存在(可能已改名),请编辑该记事修正链接`);
      return;
    }
    gotoKbLink(n.kb_id, n.content);
  }

}

function startEditNote(id, scope){

// 切换一条记事的置顶状态。
async function togglePin(id, scope){
  const n=findNote(id, scope);
  if(!n) return;
  const np=!n.pinned;
  if(scope==='local'){
    const arr=localNotes();
    const i=arr.findIndex(x=>String(x.id)===String(id));
    if(i>=0){ arr[i].pinned=np; saveLocalNotes(arr); }
  } else {
    try {
      await api('/api/notes/'+encodeURIComponent(id),{ method:'PUT',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ title:n.title, note_type:n.note_type, content:n.content,
          kb_id:n.kb_id, color:n.color, pinned:np }) });
    } catch(e){ toast('操作失败:'+e); return; }
  }
  loadNotes();
}

async function deleteNote(id, scope){
  if(scope==='local'){
    saveLocalNotes(localNotes().filter(n=>String(n.id)!==String(id)));
  } else {
    try { await api('/api/notes/'+encodeURIComponent(id),{method:'DELETE'}); }
    catch(e){ toast('删除失败:'+e); return; }
  }
  if(NOTE_EDIT && String(NOTE_EDIT.id)===String(id) && NOTE_EDIT.scope===scope) resetNoteForm();
  loadNotes();
}

// 解析知识库 web 链接 → {kb, path}。支持完整 URL 或站内 /知识库/路径。
function parseKbUrl(u){
  const s=(u||'').trim();
  if(!s) return null;
  let pathname;
  try {
    pathname = /^https?:\/\//i.test(s) ? new URL(s).pathname : (s.startsWith('/')?s:'/'+s);
  } catch(e){ return null; }
  const segs=pathname.split('/').filter(Boolean)
    .map(x=>{ try{ return decodeURIComponent(x); }catch(e){ return x; } });
  if(!segs.length) return null;
  return { kb:segs[0], path:segs.slice(1).join('/') };
}

// 知识库链接点击:本页跳到目标位置(像文件名带扩展名走预览,否则当目录)
async function gotoKbLink(kb, path){
  document.getElementById('navNotes').classList.remove('active');
  clearHash();
  if(!KBS.find(k=>k.id===kb)){ toast('知识库「'+kb+'」不存在'); return; }
  const p=(path||'').trim();
  const last=p.split('/').pop()||'';
  if(last.includes('.')){
    VIEW='list';
    previewFile(rawUrl(p,kb), last);
  } else {
    if(!EXPANDED.has(kb)){ EXPANDED.add(kb); await loadTree(kb); }
    selectFolder(kb, p||'docs');
  }
}

// 搜索历史(localStorage,最近 12 条)
function searchHistory(){ try{ return JSON.parse(localStorage.getItem('ktree-search-hist'))||[]; }catch(e){ return []; } }
function pushSearchHistory(q){
  q=(q||'').trim(); if(!q) return;
  const h=searchHistory().filter(x=>x!==q);
  h.unshift(q);
  saveLS('ktree-search-hist', h.slice(0,12));
}
function hideSearchHist(){ const b=document.getElementById('searchHist'); if(b) b.style.display='none'; }
function showSearchHist(){
  const box=document.getElementById('searchHist');
  const h=searchHistory();
  if(!h.length){ hideSearchHist(); return; }
  box.innerHTML='<div class="sh-head"><span>搜索历史</span><span class="sh-clear">清空</span></div>'
    + h.map(()=>'<div class="sh-item"></div>').join('');
  const items=box.querySelectorAll('.sh-item');
  h.forEach((q,i)=>{
    items[i].textContent=q;
    items[i].onmousedown=ev=>{ ev.preventDefault(); gs.value=q; syncSearchClear(); hideSearchHist(); doSearch(); };
  });
  box.querySelector('.sh-clear').onmousedown=ev=>{
    ev.preventDefault(); localStorage.removeItem('ktree-search-hist'); showSearchHist();
  };
  box.style.display='';
}
gs.addEventListener('focus', showSearchHist);
gs.addEventListener('blur', ()=>setTimeout(hideSearchHist,150));
async function doSearch(){
  const q=gs.value.trim();
  if(!q){ if(CUR_KB) selectFolder(CUR_KB,CUR_PATH); return; }
  pushSearchHistory(q);
  hideSearchHist();
  VIEW='search'; LAST_QUERY=q;
  document.getElementById('navNotes').classList.remove('active');
  document.getElementById('btnNewNote').style.display='none';
  clearHash();
  renderCrumb(); renderSidebar();
  document.getElementById('btnUpload').style.display='none';
  document.getElementById('btnUploadFolder').style.display='none';
  document.getElementById('btnNewFolder').style.display='none';
  const box=document.getElementById('listArea');
  box.innerHTML='<div class="empty">搜索中…</div>';
  try {
    let url=`/api/search?q=${encodeURIComponent(q)}&limit=40`;
    if(CUR_KB) url+='&kb='+encodeURIComponent(CUR_KB);
    const hits=(await api(url)).hits||[];
    if(!hits.length){ box.innerHTML='<div class="empty">未找到匹配文档</div>'; return; }
    box.innerHTML=hits.map(h=>{
      // 优先用真实 md_path / rel_path 走 'view' 分发(html → iframe, md → markdown, 图片 → 图片浏览)
      // 旧索引/missing 字段则回落到 'viewmd' 读转换后的 md(用 lossy 解码)
      const previewPath=previewPathOf(h);
      const previewName=previewPath?previewPath.split('/').pop():(h.title+'.md');
      if(previewPath && h.kb_id){
        // 文件所在目录仍指向 docs 阅读视图;预览路径由 previewPathOf 决定。
        const relP=h.rel_path||'';
        const dirRel=relP.includes('/')?relP.substring(0,relP.lastIndexOf('/')):'';
        const dirPath=dirRel?('docs/'+dirRel):'docs';
        const pathHtml=` · <span class="sr-path" data-act="goto-dir" data-kb="${esc(h.kb_id)}"
          data-dir="${esc(dirPath)}" title="跳转到所在目录">${esc(dirPath)}/</span>`;
        return `<div class="sr-row" data-act="view" data-kb="${esc(h.kb_id)}"
            data-path="${esc(previewPath)}" data-name="${esc(previewName)}">
          <div class="t">${esc(h.title)} <span class="tag">${esc(h.category||'未分类')}</span></div>
          <div class="m">#${h.doc_id} · 相关度 ${h.score.toFixed(2)}${pathHtml}</div>
          <div class="s">${esc(h.summary)}</div>
        </div>`;
      }
      return `<div class="sr-row" data-act="viewmd" data-id="${h.doc_id}" data-name="${esc(h.title)}.md">
        <div class="t">${esc(h.title)} <span class="tag">${esc(h.category||'未分类')}</span></div>
        <div class="m">#${h.doc_id} · 相关度 ${h.score.toFixed(2)}</div>
        <div class="s">${esc(h.summary)}</div>
      </div>`;
    }).join('');
  } catch(e){ box.innerHTML='<div class="empty">搜索失败:'+esc(e)+'</div>'; }
}

// ---------- 列表区事件委托 ----------
document.getElementById('listArea').addEventListener('click',e=>{
  const el=e.target.closest('[data-act]');
  if(!el) return;
  const act=el.dataset.act;
  const kb=el.dataset.kb||CUR_KB;
  const path=el.dataset.path;
  if(act==='enter') selectFolder(CUR_KB, path);
  else if(act==='goto-dir'){ gotoDir(el.dataset.kb||CUR_KB, el.dataset.dir); }
  else if(act==='view') previewFile(rawUrl(path,kb), el.dataset.name);
  else if(act==='open') openUrl(rawUrl(path,kb), el.dataset.ext);
  else if(act==='viewmd') showMarkdownPreview(`/api/doc/${el.dataset.id}/md`, el.dataset.name);
  else if(act==='del') delDoc(+el.dataset.id);
  else if(act==='fav') toggleFav(kb,path);
  else if(act==='copy') doCopyAddr(el,kb,path,el.dataset.isfolder==='1');
  else if(act==='more') showMoreMenu(el,kb,path,el.dataset.id,el.dataset.md,el.dataset.ref,el.dataset.isfolder==='1');
  else if(act==='notecard'){ const n=findNote(el.dataset.id,el.dataset.scope); if(n) openNote(n); }
  else if(act==='noteedit') startEditNote(el.dataset.id, el.dataset.scope);
  else if(act==='notepin') togglePin(el.dataset.id, el.dataset.scope);
  else if(act==='notecopy') copyNoteLink(el.dataset.id);
  else if(act==='notedel') deleteNote(el.dataset.id, el.dataset.scope);
});
function openUrl(url,ext){
  if(PREVIEWABLE.has((ext||'').toLowerCase())){ window.open(url,'_blank'); }
  else { const a=document.createElement('a'); a.href=url; a.download=''; document.body.appendChild(a); a.click(); a.remove(); }
}
async function delFolder(kb, rp){
  // rp 形如 "src/upload/T1/sub";展示会被删的对应目录路径
  const name = rp.split('/').pop();
  const sub = rp.startsWith('src/') ? rp.slice(4) : rp;
  const ok = await confirmDialog(
    '确认删除文件夹「' + name + '」?\n将一并删除以下目录及其全部内容:',
    { detail: [rp+'/', 'docs/'+sub+'/(含转换产物与 .assets 资源)'], okText:'删除', danger:true });
  if(!ok) return;
  try {
    const r = await api(`/api/folder?kb=${encodeURIComponent(kb)}&path=${encodeURIComponent(rp)}`,
      {method:'DELETE'});
    toast(`已删除文件夹,清理 ${r.deleted_docs||0} 篇文档`);
    await loadKbs(); await loadTree(kb);
    // 当前目录被删,回到父目录
    if(VIEW==='list'){
      if(CUR_PATH===rp || CUR_PATH.startsWith(rp+'/')){
        const parent = rp.includes('/') ? rp.substring(0, rp.lastIndexOf('/')) : 'src';
        selectFolder(kb, parent);
      } else { loadDir(); }
    }
  } catch(e){ toast('删除失败:'+e); }
}

async function delDoc(id,name,relPath,mdPath,assetsDir){
  const label=name?`「${name}」`:('文档 #'+id);
  let detail=null;
  if(relPath){
    detail=[relPath];
    if(mdPath) detail.push(mdPath);
    if(assetsDir) detail.push(assetsDir+'/');
  }
  const ok=await confirmDialog(
    '确认删除 '+label+' ?\n将删除以下文件:',
    {detail,okText:'删除',danger:true});
  if(!ok) return;
  try { await api('/api/doc/'+id,{method:'DELETE'}); toast('已删除');
    await loadKbs(); if(VIEW==='list') loadDir(); }
  catch(e){ toast('删除失败:'+e); }
}

// ---------- 预览(照搬 Haystack)----------
function createModal(name, openUrl){
  const overlay=document.createElement('div');
  overlay.className='pv-overlay';
  const box=document.createElement('div'); box.className='pv-box';
  const head=document.createElement('div'); head.className='pv-head';
  const title=document.createElement('div'); title.className='pv-title'; title.textContent=name;
  head.appendChild(title);
  if(openUrl){
    const bo=document.createElement('button'); bo.className='btn ghost sm'; bo.textContent='在新标签打开';
    bo.onclick=()=>window.open(openUrl,'_blank'); head.appendChild(bo);
  }
  const close=document.createElement('button'); close.className='btn ghost sm'; close.textContent='关闭';
  close.onclick=()=>overlay.remove(); head.appendChild(close);
  box.appendChild(head);
  const body=document.createElement('div'); body.className='pv-body'; box.appendChild(body);
  overlay.appendChild(box);
  overlay.addEventListener('click',e=>{ if(e.target===overlay) overlay.remove(); });
  document.addEventListener('keydown',function h(e){
    if(e.key==='Escape'){ overlay.remove(); document.removeEventListener('keydown',h); }
  });
  document.body.appendChild(overlay);
  return body;
}
function previewFile(url,name){
  const ext=extOf(name);
  if(MD_EXT.has(ext)) return showMarkdownPreview(url,name);
  if(IMG_EXT.has(ext)) return showImagePreview(url,name);
  if(HTML_EXT.has(ext)) return showHtmlPreview(url,name);
  if(ext==='pdf') return showPdfPreview(url,name);
  if(VIDEO_EXT.has(ext)) return showMediaPreview(url,name,'video');
  if(AUDIO_EXT.has(ext)) return showMediaPreview(url,name,'audio');
  if(CODE_EXT.has(ext)||TEXT_EXT.has(ext)||ext==='json') return showCodePreview(url,name);
  return showBinaryPreview(url,name);
}
async function showMarkdownPreview(url,name){
  const body=createModal(name,url);
  body.innerHTML='<div class="md-body"><p style="color:#ccc">加载中…</p></div>';
  try {
    const text=await (await fetch(url)).text();
    if(window.marked){
      if(window.hljs){
        marked.setOptions({ highlight:(code,lang)=>{
          try { return lang&&hljs.getLanguage(lang)
            ? hljs.highlight(code,{language:lang}).value : hljs.highlightAuto(code).value; }
          catch(e){ return code; }
        }});
      }
      body.innerHTML='<div class="md-body">'+marked.parse(text)+'</div>';
    } else { body.innerHTML='<pre class="pv-code">'+esc(text)+'</pre>'; }
  } catch(e){ body.innerHTML='<div class="md-body"><p style="color:#c00">加载失败:'+esc(e)+'</p></div>'; }
}
async function showCodePreview(url,name){
  const body=createModal(name,url);
  body.innerHTML='<pre class="pv-code">加载中…</pre>';
  try {
    const text=await (await fetch(url)).text();
    const pre=document.createElement('pre'); pre.className='pv-code hljs';
    const code=document.createElement('code'); code.textContent=text;
    pre.appendChild(code); body.innerHTML=''; body.appendChild(pre);
    if(window.hljs){ try { hljs.highlightElement(code); } catch(e){} }
  } catch(e){ body.innerHTML='<pre class="pv-code" style="color:#c00">加载失败:'+esc(e)+'</pre>'; }
}
function showImagePreview(url,name){
  // 当前目录里的图片清单(用于上一张/下一张)
  let imgs = LAST_FILES.filter(f => IMG_EXT.has(extOf(f.name||'')))
    .map(f => ({ url: rawUrl(f.rel_path, CUR_KB), name: f.name, size: f.size }));
  if(!imgs.length || !imgs.some(i => i.url === url)){
    imgs = [{ url, name, size: 0 }];
  }
  let idx = imgs.findIndex(i => i.url === url); if(idx < 0) idx = 0;

  const body = createModal(imgs[idx].name, imgs[idx].url);
  const overlay = body.parentElement.parentElement; // pv-overlay
  const titleEl = overlay.querySelector('.pv-title');
  const openBtn = overlay.querySelector('.pv-head .btn'); // 第一个按钮(在新标签打开)

  body.style.cssText = 'flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:#fafafa;padding:0;';

  const img = document.createElement('img');
  img.style.cssText = 'max-width:calc(100% - 100px);max-height:100%;object-fit:contain;margin:0 auto;display:block;transition:transform 0.1s;transform-origin:center center;cursor:zoom-in;';

  let scale = 1;
  function applyScale(){
    img.style.transform = `scale(${scale})`;
    img.style.cursor = scale > 1 ? 'grab' : 'zoom-in';
    zoomLabel.textContent = Math.round(scale*100) + '%';
  }
  function zoomIn(){ scale = Math.min(8, +(scale*1.25).toFixed(3)); applyScale(); }
  function zoomOut(){ scale = Math.max(0.1, +(scale/1.25).toFixed(3)); applyScale(); }
  function zoomReset(){ scale = 1; applyScale(); }

  const arrowStyle = 'position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;border:none;background:rgba(0,0,0,0.25);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;z-index:1;';
  const btnPrev = document.createElement('button');
  btnPrev.style.cssText = arrowStyle + 'left:12px;';
  btnPrev.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  btnPrev.onmouseenter = () => btnPrev.style.background='rgba(0,0,0,0.45)';
  btnPrev.onmouseleave = () => btnPrev.style.background='rgba(0,0,0,0.25)';

  const btnNext = document.createElement('button');
  btnNext.style.cssText = arrowStyle + 'right:12px;';
  btnNext.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  btnNext.onmouseenter = () => btnNext.style.background='rgba(0,0,0,0.45)';
  btnNext.onmouseleave = () => btnNext.style.background='rgba(0,0,0,0.25)';

  const counter = document.createElement('div');
  counter.style.cssText = 'position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.4);color:#fff;padding:3px 12px;border-radius:10px;font-size:12px;';

  // 分辨率 / 大小
  const infoTag = document.createElement('div');
  infoTag.style.cssText = 'position:absolute;bottom:12px;left:12px;background:rgba(0,0,0,0.4);color:#fff;padding:3px 12px;border-radius:10px;font-size:12px;';

  // 缩放控件
  const zoomBar = document.createElement('div');
  zoomBar.style.cssText = 'position:absolute;bottom:12px;right:12px;display:flex;gap:4px;align-items:center;background:rgba(0,0,0,0.4);color:#fff;padding:2px 6px;border-radius:10px;font-size:12px;user-select:none;';
  const zoomBtnStyle = 'border:none;background:transparent;color:#fff;width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;';
  const btnZoomOut = document.createElement('button');
  btnZoomOut.style.cssText = zoomBtnStyle; btnZoomOut.textContent = '−'; btnZoomOut.title = '缩小 (Ctrl+-)';
  btnZoomOut.onmouseenter = () => btnZoomOut.style.background='rgba(255,255,255,0.15)';
  btnZoomOut.onmouseleave = () => btnZoomOut.style.background='transparent';
  btnZoomOut.addEventListener('click', e => { e.stopPropagation(); zoomOut(); });
  const zoomLabel = document.createElement('span');
  zoomLabel.style.cssText = 'min-width:42px;text-align:center;cursor:pointer;';
  zoomLabel.title = '点击复位 (Ctrl+0)'; zoomLabel.textContent = '100%';
  zoomLabel.addEventListener('click', e => { e.stopPropagation(); zoomReset(); });
  const btnZoomIn = document.createElement('button');
  btnZoomIn.style.cssText = zoomBtnStyle; btnZoomIn.textContent = '+'; btnZoomIn.title = '放大 (Ctrl++)';
  btnZoomIn.onmouseenter = () => btnZoomIn.style.background='rgba(255,255,255,0.15)';
  btnZoomIn.onmouseleave = () => btnZoomIn.style.background='transparent';
  btnZoomIn.addEventListener('click', e => { e.stopPropagation(); zoomIn(); });
  zoomBar.append(btnZoomOut, zoomLabel, btnZoomIn);

  // 双击 / Ctrl+滚轮 缩放
  img.addEventListener('dblclick', e => { e.stopPropagation(); scale===1 ? (scale=2, applyScale()) : zoomReset(); });
  body.addEventListener('wheel', e => {
    if(e.ctrlKey || e.metaKey){ e.preventDefault(); e.deltaY<0 ? zoomIn() : zoomOut(); }
  }, { passive:false });

  img.addEventListener('load', () => {
    const w = img.naturalWidth, h = img.naturalHeight;
    const sz = imgs[idx].size ? '  ·  ' + fmtSize(imgs[idx].size) : '';
    infoTag.textContent = `${w} × ${h}${sz}`;
  });

  function show(i){
    idx = i;
    img.src = imgs[idx].url;
    titleEl.textContent = imgs[idx].name;
    if(openBtn && openBtn.textContent === '在新标签打开'){
      openBtn.onclick = () => window.open(imgs[idx].url, '_blank');
    }
    counter.textContent = (idx+1) + ' / ' + imgs.length;
    btnPrev.style.visibility = idx > 0 ? 'visible' : 'hidden';
    btnNext.style.visibility = idx < imgs.length - 1 ? 'visible' : 'hidden';
    infoTag.textContent = '';
    zoomReset();
  }

  btnPrev.addEventListener('click', e => { e.stopPropagation(); if(idx>0) show(idx-1); });
  btnNext.addEventListener('click', e => { e.stopPropagation(); if(idx<imgs.length-1) show(idx+1); });

  function onKey(e){
    if(e.key === 'ArrowLeft' && idx > 0) show(idx-1);
    if(e.key === 'ArrowRight' && idx < imgs.length-1) show(idx+1);
    if((e.ctrlKey||e.metaKey) && (e.key === '=' || e.key === '+')){ e.preventDefault(); zoomIn(); }
    if((e.ctrlKey||e.metaKey) && e.key === '-'){ e.preventDefault(); zoomOut(); }
    if((e.ctrlKey||e.metaKey) && e.key === '0'){ e.preventDefault(); zoomReset(); }
  }
  document.addEventListener('keydown', onKey);
  const observer = new MutationObserver(() => {
    if(!overlay.isConnected){ document.removeEventListener('keydown', onKey); observer.disconnect(); }
  });
  observer.observe(document.body, { childList:true });

  body.append(btnPrev, img, btnNext, infoTag, zoomBar);
  if(imgs.length > 1) body.appendChild(counter);
  show(idx);
}
function showHtmlPreview(url,name){
  const body=createModal(name,url);
  const ifr=document.createElement('iframe'); ifr.src=url; body.appendChild(ifr);
}
function showPdfPreview(url,name){

  const emb=document.createElement('embed'); emb.src=url; emb.type='application/pdf'; body.appendChild(emb);
}
function showMediaPreview(url,name,kind){
  const body=createModal(name,url);
  const el=document.createElement(kind); el.src=url; el.controls=true; body.appendChild(el);
}
function showBinaryPreview(url,name){
  const body=createModal(name,url);
