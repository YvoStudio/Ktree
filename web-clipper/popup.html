<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<style>
  :root { --accent:#5b21b6; --line:#e6e6e6; --muted:#888; }
  * { box-sizing:border-box; }
  body { width:300px; margin:0; padding:14px; font:13px/1.5 -apple-system,"Segoe UI",sans-serif; color:#333; }
  h1 { margin:0 0 12px; font-size:14px; color:var(--accent); }
  label { display:block; font-size:11px; color:var(--muted); margin:9px 0 3px; }
  input, select { width:100%; padding:6px 8px; border:1px solid var(--line); border-radius:6px; font-size:13px; }
  .row { display:flex; gap:6px; }
  .row > select { flex:1; }
  .row > button.icon { flex:0 0 auto; width:32px; padding:0; border:1px solid var(--line);
    background:#fafafa; border-radius:6px; cursor:pointer; }
  .row > button.icon:hover { background:#f0eef7; }
  .btns { display:flex; gap:8px; margin-top:14px; }
  .btns button { flex:1; padding:8px; border:0; border-radius:6px; cursor:pointer; font-size:13px; color:#fff; }
  #clipPage { background:var(--accent); }
  #clipSel { background:#7c6aa8; }
  .btns button:hover { filter:brightness(1.08); }
  .status { margin-top:11px; font-size:12px; min-height:16px; color:var(--muted); word-break:break-all; }
  .status.ok { color:#16a34a; }
  .status.err { color:#dc2626; }
</style>
</head>
<body>
  <h1>剪藏到 Ktree</h1>

  <label>Ktree 地址</label>
  <input id="base" type="text" placeholder="http://127.0.0.1:8080" autocomplete="off" />

  <label>目标知识库</label>
  <div class="row">
    <select id="kb"></select>
    <button id="reload" class="icon" title="刷新知识库列表">⟳</button>
  </div>

  <label>子目录(上传区内)</label>
  <input id="folder" type="text" placeholder="clips" autocomplete="off" />

  <div class="btns">
    <button id="clipPage">剪藏整页</button>
    <button id="clipSel">剪藏选区</button>
  </div>

  <div id="status" class="status"></div>

  <script src="popup.js"></script>
</body>
</html>
